<!--
  Registrar Planeta 
-->
<div class="app-layout">
  <app-sidebar></app-sidebar>
  <div class="main-content">

    <div class="page-header">
      <h1>Registrar Planeta</h1>
      <p>Añadir nuevo planeta al catálogo galáctico del Imperio</p>
    </div>

    <div class="alert alert-success" *ngIf="exitoso">
      ✓ Planeta registrado exitosamente en el catálogo galáctico.
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">
      ⚠ {{ errorMessage }}
    </div>

    <div class="grid-2">

      <div class="card">
        <div class="section-title" style="margin-bottom:20px;">Datos Generales</div>

        <div class="form-group">
          <label class="form-label">Nombre del planeta *</label>
          <input class="form-input" placeholder="Ej: Namek" [(ngModel)]="nombre">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Coordenadas X *</label>
            <input class="form-input" placeholder="-4.820" [(ngModel)]="coordenadasX">
          </div>
          <div class="form-group">
            <label class="form-label">Coordenadas Y *</label>
            <input class="form-input" placeholder="11.340" [(ngModel)]="coordenadasY">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Atmósfera</label>
            <select class="form-select" [(ngModel)]="atmosfera">
              <option>Nitrógeno-Oxígeno</option>
              <option>Metano</option>
              <option>Amoníaco</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Nivel tecnológico</label>
            <select class="form-select" [(ngModel)]="nivelTecnologico">
              <option>Primitivo</option>
              <option>Medieval</option>
              <option>Avanzado</option>
              <option>Interestelar</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Población estimada</label>
          <input class="form-input" placeholder="Ej: 130,000,000" [(ngModel)]="poblacion">
        </div>
      </div>

      <div class="card">
        <div class="section-title" style="margin-bottom:20px;">Evaluación de Recursos</div>

        <div class="form-group">
          <label class="form-label">Recursos primarios</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;margin-bottom:12px;">
            <span class="tag" *ngFor="let r of recursos">{{ r }}</span>
            <span class="badge badge-warn" style="cursor:pointer;" (click)="agregarRecurso()">+ Añadir</span>
          </div>
          <input class="form-input" *ngIf="mostrarInputRecurso"
            placeholder="Ej: Zirconio"
            [(ngModel)]="nuevoRecurso"
            (keyup.enter)="confirmarRecurso()">
        </div>

        <div class="form-group">
          <label class="form-label">Nivel de dificultad de conquista</label>
          <select class="form-select" [(ngModel)]="dificultad">
            <option>Bajo</option>
            <option>Medio</option>
            <option>Alto</option>
            <option>Extremo</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Valor estimado (créditos galácticos)</label>
          <input class="form-input" placeholder="Ej: 4,500,000" [(ngModel)]="valorEstimado">
        </div>

        <div class="form-group">
          <label class="form-label">Estado inicial</label>
          <select class="form-select" [(ngModel)]="estado">
            <option>Identificado</option>
            <option>En evaluación</option>
            <option>Listo para asignar</option>
          </select>
        </div>

        <div style="display:flex;gap:12px;margin-top:8px;">
          <button class="btn btn-primary" (click)="registrar()" [disabled]="cargando">
            {{ cargando ? 'Registrando...' : 'Registrar Planeta' }}
          </button>
          <button class="btn btn-secondary" (click)="limpiar()">Limpiar</button>
        </div>

      </div>
    </div>

  </div>
</div>
