<nav class="sidenav">

  </div>

  <div class="sidenav-section">
    <div class="sidenav-title">Catálogo Planetario</div>
    <a class="sidenav-item" routerLink="/planetas" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <span class="sidenav-icon">🪐</span>Listar Planetas
    </a>
    <a class="sidenav-item" routerLink="/planetas/registrar" routerLinkActive="active">
      <span class="sidenav-icon">➕</span>Registrar Planeta
    </a>
  </div>

  <div class="sidenav-divider"></div>

  <div class="sidenav-section">
    <div class="sidenav-title">Equipos y Misiones</div>

      <span class="sidenav-icon">⚔️</span>Registrar Equipo
    </a>
    <a class="sidenav-item" routerLink="/misiones/asignar" routerLinkActive="active">

    </a>
    <a class="sidenav-item" routerLink="/misiones/estado" routerLinkActive="active">
      <span class="sidenav-icon">📡</span>Estado de Misión
    </a>
  </div>

      <span class="sidenav-icon">👤</span>Registro Usuario
    </a>
  </div>

  <div class="sidenav-user">
